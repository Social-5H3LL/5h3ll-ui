name: Deploy to Cloudflare Workers + Publish to npm

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs:build

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy --name 5h3ll-ui-docs

      - name: Build packages
        run: npm run build

      - name: Publish @social-5h3ll/5h3ll-ui to npm
        run: |
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          npm publish packages/css --access public --registry https://registry.npmjs.org/ --git-tag-version false
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @social-5h3ll/5h3ll-cli to npm
        run: |
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          npm publish packages/cli --access public --registry https://registry.npmjs.org/ --git-tag-version false
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}